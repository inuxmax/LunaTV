version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: lunatv-redis
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lunatv-app
    ports:
      - '3000:3000'
    depends_on:
      redis:
        condition: service_healthy
    environment:
#Loại lưu trữ: sử dụng redis
      - NEXT_PUBLIC_STORAGE_TYPE=redis
# Địa chỉ kết nối Redis (được truy cập thông qua tên dịch vụ trong vùng chứa)
      - REDIS_URL=redis://redis:6379
#tài khoản quản trị trang web
      - USERNAME=admin
#Mật khẩu quản trị trang web
      - PASSWORD=admin123
# Tên trang web (tùy chọn)
      - NEXT_PUBLIC_SITE_NAME=MoonTV

volumes:
  redis-data:
